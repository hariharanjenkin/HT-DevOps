name: CI-CD Demo weekend community

on:
  push:
    branches: [ "main" ]
  
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region us-east-1 \
        | docker login --username AWS --password-stdin 568166345498.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Docker Image
      run: docker build -t cicd-demo-app .

    - name: Tag Docker Image
      run: docker tag cicd-demo-app:latest 568166345498.dkr.ecr.us-east-1.amazonaws.com/cicd-demo-app:latest

    - name: Push Docker Image to ECR
      run: docker push 568166345498.dkr.ecr.us-east-1.amazonaws.com/cicd-demo-app:latest