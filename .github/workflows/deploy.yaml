name: CI-CD Advanced Demo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 568166345498.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: cicd-demo-app

jobs:

  # 🔹 Stage 1 - Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t cicd-demo-app .

  # 🔹 Stage 2 - Unit Test
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Run Unit Tests
        run: |
          echo "Running tests..."
          # Example:
          # npm install
          # npm test

  # 🔹 Stage 3 - Security Scan (🔥 IMPACT)
  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Scan Docker Image using Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cicd-demo-app
          format: table

  # 🔹 Stage 4 - Push to ECR
  push:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Tag Image
        run: docker tag cicd-demo-app:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Image
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

